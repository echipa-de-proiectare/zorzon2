services:
  backend:
    container_name: zorzon_backend
    build:
      context: .
      dockerfile: ./backend/Dockerfile.dev
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "1337:1337"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: zorzon_db
    depends_on:
      - db
    networks:
      - zorzon

  frontend:
    container_name: zorzon_frontend
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./frontend/.env:/opt/app/.env
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - zorzon

  ar-viewer:
    container_name: zorzon_ar-viewer
    build:
      context: .
      dockerfile: ./ar-viewer/Dockerfile.dev
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - ./ar-viewer:/app
      - /app/node_modules
      - ./ar-viewer/.env:/opt/app/.env
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - zorzon

  db:
    container_name: zorzon_db
    image: postgres:15
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/docker-entrypoint-initdb.d # Mount backup directory to init scripts
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi
    ports:
      - "5433:5432"
    networks:
      - zorzon

volumes:
  postgres_data:

networks:
  zorzon:
    driver: bridge
