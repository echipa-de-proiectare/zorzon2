services:
  backend:
    container_name: zorzon_backend
    build:
      context: .
      dockerfile: ./backend/Dockerfile.dev
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - ./backend:/app
      - main_backend_node_modules:/app/node_modules
    ports:
      - "1337:1337"
    env_file:
      - ./backend/.env.test.local
    environment:
      DATABASE_HOST: zorzon_db
    depends_on:
      - db
    networks:
      - zorzon

  frontend:
    container_name: zorzon_frontend
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - ./frontend:/app
      - main_frontend_node_modules:/app/node_modules
      - ./frontend/.env.example:/opt/app/.env.example
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - zorzon

  db:
    container_name: zorzon_db
    image: postgres:15
    platform: linux/amd64 #for platform error on Apple M1 chips
    volumes:
      - main_postgres_data:/var/lib/postgresql/data
      - ./backup:/docker-entrypoint-initdb.d # Mount backup directory to init scripts
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi
    ports:
      - "5433:5432"
    networks:
      - zorzon

volumes:
  main_postgres_data:
  main_backend_node_modules:
  main_frontend_node_modules:

networks:
  zorzon:
    driver: bridge
