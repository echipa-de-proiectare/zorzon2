server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html; # Fallback to index.html for SPA routing
    }

    error_page 404 /index.html; # Handle 404 errors with SPA fallback

    location /static/ {
        expires 1y;
        access_log off;
    }
}
