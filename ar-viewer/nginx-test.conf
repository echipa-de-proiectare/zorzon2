
server {
    listen 5174;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html; # Fallback to index.html for SPA routing
    }

    location ~* \.mjs$ {
        default_type application/javascript;
        add_header Content-Type application/javascript;
        try_files $uri =404;
    }

    error_page 404 /index.html; # Handle 404 errors with SPA fallback

    location /static/ {
        expires 1y;
        access_log off;
    }
}
